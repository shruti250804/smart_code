<!DOCTYPE html>
<html>

<head>

<title>Analysis Report</title>

<style>

body{
font-family:Arial;
background:#121212;
color:white;
padding:30px;
}

.container{
background:#1e1e1e;
padding:40px;
border-radius:15px;
box-shadow:0px 0px 15px black;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:#2a2a2a;
padding:20px;
border-radius:15px;
width:220px;
text-align:center;
}

.score{
font-size:40px;
color:#00ff88;
}

.warning{
background:#2a2a2a;
padding:15px;
margin-bottom:15px;
border-left:5px solid red;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>Code Analysis Report</h1>

<div class="cards">

<div class="card">
<h3>Quality Score</h3>
<h1 class="score">{{ score }}/100</h1>
</div>

<div class="card">
<h3>Functions</h3>
<h1>{{ function_count }}</h1>
</div>

<div class="card">
<h3>Lines</h3>
<h1>{{ line_count }}</h1>
</div>

</div>

<h2>Warnings & Suggestions</h2>

{% for warning in warnings %}

<div class="warning">
{{ warning }}
</div>

{% endfor %}

</div>

</body>
</html>
