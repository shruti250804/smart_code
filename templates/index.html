<!DOCTYPE html>
<html>

<head>

<title>AI Code Analyzer</title>

<style>

body{
font-family:Arial;
background:#121212;
color:white;
padding-top:50px;
}

.container{
background:#1e1e1e;
width:800px;
margin:auto;
padding:40px;
border-radius:15px;
box-shadow:0px 0px 15px black;
}

h1{
text-align:center;
margin-bottom:30px;
}

textarea{
width:100%;
height:350px;
padding:15px;
font-size:15px;
background:#2a2a2a;
color:white;
border:none;
border-radius:10px;
}

button{
margin-top:20px;
width:100%;
padding:15px;
background:#007bff;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Code Quality Analyzer</h1>

<form action="/analyze" method="POST">

<textarea
name="code"
placeholder="Paste Python code here..."
required></textarea>

<button type="submit">
Analyze Code
</button>

</form>

</div>

</body>
</html>
